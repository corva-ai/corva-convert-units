# yamllint disable rule:truthy
name: "Semantic PR"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  id-token: write
  contents: read
  statuses: write

jobs:
  validate-pr:
    name: Validate PR title
    runs-on: ubuntu-24.04
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3.0.0
        id: secrets
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_RO }}
          APP_ID: 'op://GitHub.Actions/GitHub/corva-bot/APP_ID'
          PRIVATE_KEY: 'op://GitHub.Actions/GitHub/corva-bot/PRIVATE_KEY'
      - name: Generate GitHub token
        uses: actions/create-github-app-token@v1.11.6
        id: token
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.PRIVATE_KEY }}
      - name: Add PR status check
        uses: ouzi-dev/commit-status-updater@v2.0.2
        with:
          token: ${{ steps.token.outputs.token }}
          name: 'Semantic PR'
          status: success
          url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          description: 'Skipped'
    # Re-enable once corva-ai/gh-actions workflow is accessible:
    # uses: corva-ai/gh-actions/.github/workflows/workflow-semantic-pr.yml@develop
    # secrets: inherit
